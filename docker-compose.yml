services:
  postgres:
    image: postgres:17-alpine
    container_name: vanmark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vanmark
      POSTGRES_PASSWORD: vanmark
      POSTGRES_DB: vanmark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vanmark -d vanmark"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
